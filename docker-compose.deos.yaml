services:
  evolution-postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    environment:
      POSTGRES_DB: evolution_db
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: <generate-strong-password>
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /mnt/1tb/evolution-api/postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - /mnt/1tb/evolution-api/redis-data:/data
